#------------------------------------------------------------------------------
# SPEC CPU 2017 config for RISC-V cross-compilation (GCC)
#------------------------------------------------------------------------------
%define label riscv64-gcc

%ifndef %{build_ncpus}
%   define  build_ncpus 8
%endif

command_add_redirect = 1
ignore_errors        = 1
iterations           = 1
label                = %{label}
line_width           = 1020
log_line_width       = 1020
makeflags            = --jobs=%{build_ncpus}
mean_anyway          = 1
output_format        = txt,csv
preenv               = 1
reportable           = 0
strict_rundir_verify = 0
tune                 = base
verify_binaries      = 0

intrate,fprate:
   copies           = 1
intspeed,fpspeed:
   threads          = 1

default:
   CC                      = riscv64-linux-gnu-gcc --sysroot=/sysroot
   CXX                     = riscv64-linux-gnu-g++ --sysroot=/sysroot
   FC                      = riscv64-linux-gnu-gfortran --sysroot=/sysroot
   CC_VERSION_OPTION       = --version
   CXX_VERSION_OPTION      = --version
   FC_VERSION_OPTION       = --version
   COPTIMIZE    = -static
   CXXOPTIMIZE  = -static
   FOPTIMIZE    = -static
   PORTABILITY  = -DSPEC_CPU_LINUX
   EXTRA_LDFLAGS = -static

default:
   sw_base_ptrsize = 64-bit
   sw_peak_ptrsize = 64-bit

default:
   EXTRA_PORTABILITY = -DSPEC_LP64

500.perlbench_r,600.perlbench_s:
   PORTABILITY    = -DSPEC_MANUAL_CONFIG -DSPEC_LINUX -DSPEC_LP64 -DSPEC_LITTLEENDIAN

521.wrf_r,621.wrf_s:
   CPORTABILITY  = -DSPEC_CASE_FLAG
   FPORTABILITY  = -fconvert=big-endian

523.xalancbmk_r,623.xalancbmk_s:
   PORTABILITY   = -DSPEC_LINUX

526.blender_r:
   PORTABILITY   = -funsigned-char -DSPEC_LINUX

527.cam4_r,627.cam4_s:
   PORTABILITY   = -DSPEC_CASE_FLAG

628.pop2_s:
   CPORTABILITY    = -DSPEC_CASE_FLAG
   FPORTABILITY    = -fconvert=big-endian

default=base:
   OPTIMIZE       = -g -O3

#----------------------------------------------------------------------
# GCC workarounds (required for GCC 10+)
#----------------------------------------------------------------------
# Integer workarounds - base
intrate=base:
   EXTRA_CFLAGS = -fno-strict-aliasing -fno-unsafe-math-optimizations -fno-finite-math-only -fgnu89-inline -fcommon

# FP workarounds - base (includes GCC 10+ Fortran fix and 510.parest_r C++03 fix)
fprate=base:
   EXTRA_CFLAGS = -fno-strict-aliasing
   EXTRA_CXXFLAGS = -std=c++03
   EXTRA_FFLAGS = -fallow-argument-mismatch

default:
   basepeak = yes
