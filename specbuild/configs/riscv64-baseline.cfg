#------------------------------------------------------------------------------
# SPEC CPU 2017 config for RISC-V cross-compilation
# Mitigation: BASELINE (no mitigations)
#------------------------------------------------------------------------------

%define label riscv64-baseline

#--------- Build settings -----------------------------------------------------
%ifndef %{build_ncpus}
%   define  build_ncpus 8
%endif

#--------- Global Settings ----------------------------------------------------
command_add_redirect = 1
ignore_errors        = 1
iterations           = 1
label                = %{label}
line_width           = 1020
log_line_width       = 1020
makeflags            = --jobs=%{build_ncpus}
mean_anyway          = 1
output_format        = txt,html,cfg,csv
preenv               = 1
reportable           = 0
strict_rundir_verify = 0
tune                 = base

intrate,fprate:
   copies           = 1
intspeed,fpspeed:
   threads          = 1

#--------- Compilers ----------------------------------------------------------
default:
   CC                      = /opt/llvm-riscv/bin/clang --target=riscv64-linux-gnu --sysroot=/sysroot -I/sysroot/usr/include/riscv64-linux-gnu
   CXX                     = /opt/llvm-riscv/bin/clang++ -std=c++14 --target=riscv64-linux-gnu --sysroot=/sysroot -I/sysroot/usr/include/riscv64-linux-gnu
   FC                      = /bin/false

   CC_VERSION_OPTION       = --version
   CXX_VERSION_OPTION      = --version
   FC_VERSION_OPTION       = /bin/false

   # Base optimization flags - NO MITIGATIONS
   COPTIMIZE    = -static -fcommon -Wno-everything
   CXXOPTIMIZE  = -static -Wno-everything

   PORTABILITY  = -DSPEC_CPU_LINUX
   EXTRA_LDFLAGS = -static

default:
   sw_base_ptrsize = 64-bit
   sw_peak_ptrsize = 64-bit

#--------- Fortran (disabled) -------------------------------------------------
any_fortran:
   fail_build = 1

#--------- Portability --------------------------------------------------------
default:
   EXTRA_PORTABILITY = -DSPEC_LP64

500.perlbench_r,600.perlbench_s:
   PORTABILITY    = -DSPEC_LINUX_X64

521.wrf_r,621.wrf_s:
   CPORTABILITY  = -DSPEC_CASE_FLAG
   FPORTABILITY  = -fconvert=big-endian

523.xalancbmk_r,623.xalancbmk_s:
   PORTABILITY   = -DSPEC_LINUX

526.blender_r:
   PORTABILITY   = -funsigned-char -DSPEC_LINUX

527.cam4_r,627.cam4_s:
   PORTABILITY   = -DSPEC_CASE_FLAG

628.pop2_s:
   CPORTABILITY    = -DSPEC_CASE_FLAG
   FPORTABILITY    = -fconvert=big-endian

#--------- Tuning -------------------------------------------------------------
default=base:
   OPTIMIZE       = -g -O2 -fno-unsafe-math-optimizations -fno-finite-math-only

intrate,intspeed=base:
   EXTRA_COPTIMIZE = -fno-strict-aliasing -fgnu89-inline

default:
   basepeak = yes
